  <div style="text-align:center;max-width:900px;margin:0 auto 60px;padding:0 20px">
    <h1 style="font-size:3.5em;color:#0077cc;margin:0 0 20px;font-weight:bold">🚀 Free IRS E-File 2026</h1>

    <div id="countdown" style="font-size:3em;font-weight:bold">Loading...</div>
  </div>

  <!-- ZIP CHECK -->
  <div style="background:#fff;padding:40px;border-radius:20px;box-shadow:0 15px 50px rgba(0,0,0,.1);max-width:700px;margin:60px auto;text-align:center">
    <h2 style="color:#0077cc;font-size:2.2em;margin:0 0 30px">🔍 ZIP Eligibility (2 Seconds)</h2>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;align-items:center">
      <input id="zipcode" placeholder="Enter ZIP (ex: 90210)" style="padding:20px;font-size:1.3em;border:3px solid #ddd;border-radius:15px;width:300px;max-width:100%;box-sizing:border-box">
      <button onclick="checkZip()" style="padding:20px 40px;background:#0077cc;color:#fff;border:none;border-radius:15px;font-size:1.3em;font-weight:bold;cursor:pointer;box-shadow:0 8px 25px rgba(0,119,204,.3)">✅ Check Free</button>
    </div>
    <div id="zipresult" style="margin-top:30px;font-size:1.6em;font-weight:bold;color:#28a745;display:none;padding:20px;background:#d4edda;border-radius:15px"></div>
  </div>

  <!-- REFUND CALC -->
  <div style="background:#fff;padding:40px;border-radius:20px;box-shadow:0 15px 50px rgba(0,0,0,.1);max-width:700px;margin:60px auto;text-align:center">
    <h2 style="color:#28a745;font-size:2.2em;margin:0 0 30px">💰 Refund Estimator</h2>
    <div style="display:grid;gap:20px;max-width:500px;margin:0 auto">
      <div>
        <label style="display:block;margin-bottom:10px;font-weight:bold;font-size:1.2em">Annual Income:</label>
        <input id="income" type="number" placeholder="$50,000" style="padding:15px;font-size:1.2em;border:3px solid #ddd;border-radius:10px;width:100%;box-sizing:border-box">
      </div>
      <div>
        <label style="display:block;margin-bottom:10px;font-weight:bold;font-size:1.2em">Taxes Withheld:</label>
        <input id="taxes" type="number" placeholder="$6,000" style="padding:15px;font-size:1.2em;border:3px solid #ddd;border-radius:10px;width:100%;box-sizing:border-box">
      </div>
      <button onclick="calculateRefund()" style="padding:20px;font-size:1.3em;background:#28a745;color:#fff;border:none;border-radius:15px;font-weight:bold;cursor:pointer;box-shadow:0 8px 25px rgba(40,167,69,.3)">Calculate Refund</button>
    </div>
    <div id="refundresult" style="margin-top:30px;font-size:2.5em;font-weight:bold;color:#28a745;display:none;padding:25px;background:#d4edda;border-radius:20px;border:4px solid #28a745"></div>
  </div>

  <!-- FINAL CTA -->
  <div style="text-align:center;margin:80px 0;padding:40px;background:#0077cc;color:#fff;border-radius:25px;max-width:800px;margin-left:auto;margin-right:auto;box-shadow:0 20px 60px rgba(0,119,204,.4)">
    <h2 style="font-size:2.8em;margin:0 0 20px">Ready to File Free?</h2>
    <p style="font-size:1.5em;margin:0 0 40px">Faster than TurboTax. IRS approved nationwide.</p>
    <a href="https://urlsmush.com/dMV9oi" style="background:#ff6b35;color:#fff;padding:25px 70px;font-size:1.8em;font-weight:bold;text-decoration:none;border-radius:50px;display:inline-block;box-shadow:0 15px 50px rgba(255,107,53,.5)" rel="sponsored">🚀 Start Your Free E-File</a>
  </div>

  <script>
    // YOUR AFFILIATE URL - TRACKED EVERYWHERE
    const AFFLINK = "https://urlsmush.com/dMV9oi";
    
    // COUNTDOWN
    const deadline = new Date("2026-04-15T23:59:59").getTime();
    function updateCountdown() {
      const now = new Date().getTime();
      const distance = deadline - now;
      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      document.getElementById("countdown").innerHTML = days + "d " + hours + "h ⏰";
    }
    setInterval(updateCountdown, 3600000);
    updateCountdown();
    
    // ZIP CHECKER
    function checkZip() {
      const zip = document.getElementById('zipcode').value.trim();
      const result = document.getElementById('zipresult');
      if (zip) {
        result.innerHTML = `
          ✅ ZIP <strong>${zip}</strong> ELIGIBLE FOR FREE FILING!<br>
          <a href="${AFFLINK}" style="background:#28a745;color:#fff;padding:15px 35px;text-decoration:none;border-radius:25px;font-weight:bold;display:inline-block;margin-top:15px" rel="sponsored">Start Free Filing →</a>
        `;
        result.style.display = 'block';
        console.log('ZIP check:', zip, '→ Affiliate:', AFFLINK);
      } else {
        result.innerHTML = '<span style="color:#dc3545">Please enter ZIP code</span>';
        result.style.display = 'block';
      }
    }
    
    // REFUND CALCULATOR
    function calculateRefund() {
      const income = parseFloat(document.getElementById('income').value) || 0;
      const taxes = parseFloat(document.getElementById('taxes').value) || 0;
      const refund = Math.max(0, taxes - (income * 0.12));
      const result = document.getElementById('refundresult');
      
      if (refund > 0) {
        result.innerHTML = `
          <strong>$${refund.toLocaleString()}</strong><br>
          Estimated refund based on 12% effective rate!
        `;
      } else {
        result.innerHTML = '<span style="color:#dc3545">Enter income and taxes above</span>';
      }
      result.style.display = 'block';
    }
    
    // TRACK ALL AFFILIATE CLICKS
    document.addEventListener('click', function(e) {
      if (e.target.href === AFFLINK) {
        console.log('✅ Affiliate click tracked →', AFFLINK);
      }
    });
  </script>

</body>
</html>
